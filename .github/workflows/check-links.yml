name: Check Links

on:
  workflow_call:

jobs:
  check-links:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Build site
        run: |
          chmod +x ./blog-linux-amd64
          ./blog-linux-amd64 --build

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --root-dir public --exclude-loopback public