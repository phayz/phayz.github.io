name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  links:
    uses: ./.github/workflows/check-links.yml

  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Generate site
        run: |
          chmod +x ./blog-linux-amd64
          ./blog-linux-amd64 --build

      - uses: actions/upload-pages-artifact@v5
        with:
          path: public

  deploy:
    needs: [build, links]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/deploy-pages@v5