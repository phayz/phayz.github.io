name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        run: |
          git clone https://github.com/${{ github.repository }} .

      - name: Generate site
        run: |
          chmod +x ./blog-linux-amd64
          # chmod +x ./blog.sh
          ./blog-linux-amd64 --build

      - uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/deploy-pages@v5.0.0
