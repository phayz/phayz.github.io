name: PR Validation

on:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Generate site
        run: |
          chmod +x ./blog-linux-amd64
          ./blog-linux-amd64 --build

  validate:
    uses: ./.github/workflows/link-check.yml