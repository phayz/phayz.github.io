site:
  base_url: "/"
  # base_url: "/myblog"
  title: "My Blog"
  description: "A simple static blog built with Go"
  url: "http://localhost:3020"
  author: "Russell Dickenson"
  favicon: "static/favicon.ico"

build:
  content_dir: "content/posts"
  output_dir: "public"
  posts_per_page: 4

sidebar:
  position: "right"
  show_tags: true
  show_recent: true
  recent_count: 5

features:
  rss: true
  code_highlighting: true
  search: true

themes:
  light: "light"
  dark: "dark"