name: Build and Deploy Blog

on:
  push:
    branches: [ main ]  # or master, depending on your default branch
  workflow_dispatch:     # allows manual triggering

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build blog
        run: |
          # Make your binary executable and run it
          chmod +x ./blog.sh
          chmod +x ./blog-darwin-arm64
          ./blog.sh --build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'  # replace with your blog's output directory
      
      - name: Debug - List all files
        run: |
          echo "Current directory structure:"
          ls -la
          echo ""
          echo "Checking for common output directories:"
          for dir in public _site dist build output; do
            if [ -d "$dir" ]; then
              echo "Found directory: $dir"
              ls -la "$dir"
            fi
          done

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
