name: Build and Deploy Blog

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build blog
        run: |
          chmod +x ./blog.sh
          chmod +x ./blog-darwin-arm64
          ./blog.sh --build

      - name: Debug - List output
        run: |
          echo "=== Repo root ==="
          ls -la
          echo "=== Checking output dirs ==="
          for dir in public _site dist build output; do
            if [ -d "$dir" ]; then
              echo "Found: $dir"
              ls -la "$dir"
            fi
          done

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
